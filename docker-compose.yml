services:
  postgres:
    image: postgres:16-alpine
    container_name: dpo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: dpo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-07-15T19-02-30Z
    container_name: dpo-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done;
      mc mb --ignore-existing local/lakehouse;
      mc anonymous set download local/lakehouse;
      "

  spark-master:
    image: bitnami/spark:3.5
    container_name: dpo-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark/jobs:/opt/bitnami/spark/jobs:ro
      - ./spark/conf:/opt/bitnami/spark/conf/custom:ro

  spark-worker:
    image: bitnami/spark:3.5
    container_name: dpo-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    volumes:
      - ./spark/jobs:/opt/bitnami/spark/jobs:ro
      - ./spark/conf:/opt/bitnami/spark/conf/custom:ro

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: dpo-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-key}
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    command: version
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/spark/jobs
      - ./python:/opt/airflow/python

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: dpo-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-key}
      PYTHONPATH: /opt/airflow/python
    command: webserver
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/spark/jobs
      - ./python:/opt/airflow/python

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: dpo-airflow-scheduler
    depends_on:
      airflow-webserver:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-key}
      PYTHONPATH: /opt/airflow/python
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/spark/jobs
      - ./python:/opt/airflow/python

  metrics-exporter:
    build:
      context: .
      dockerfile: python/Dockerfile
    container_name: dpo-metrics-exporter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
      EXPORTER_PORT: 9108
    command: python -m observability.exporter
    ports:
      - "9108:9108"
    volumes:
      - ./python:/app

  auto-healer:
    build:
      context: .
      dockerfile: python/Dockerfile
    container_name: dpo-auto-healer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
      HEALER_INTERVAL_SECONDS: 60
      AUTO_HEAL_MODE: passive
    command: python -m auto_healing.healer
    volumes:
      - ./python:/app

  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: dpo-prometheus
    depends_on:
      - metrics-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.4
    container_name: dpo-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
